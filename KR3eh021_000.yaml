body:
  text: 書玉機微義後昔陸宣公罷相嘗集方書以仁乎人想見其施於當國秉政之日而被其澤者又何可勝既也耶此醫道所以取重於今昔大人君子者詎非以其理與造化者參而有斡旋橐籥之功也玉機微義一書輯於會稽徐彥純成於吳陵劉宗厚考據議論精密詳備實醫道之菽粟布帛不可無者二君子用心亦勞矣此書稿雖存未行於世故知之者鮮姑蘇都憲陳公奉命來鎮陝石於宗厚家得之始命壽梓晦而復顯少師大學士西昌楊先生喜而作文序其事真為此書之榮幸名今傳後無疑也暇日豫與二三僚友得以盡閲其書間有魯魚亥豕之訛固責在承命者之不謹且有辜負都憲之雅意亦不足以副少師先生恭體仁民愛物之心矣仍取原稿校讎凡字意差謬者釐而正之庶俾後之學者無惑焉敬書贅其後云時正統庚申春二月望日陝西等處承宣布政使司右布政使會稽王暹書左布政使郭堅等同校蘭室集醫家十要一每日勤讀醫書手不釋卷倘有良友常宜請益蓋學海無盡此乃務本之計一早起晏眠不可片時離店中凡有抱病者至必親自診視用心發藥莫仍前只靠郎中惟務安間蓋一日之計在於寅一生之計在於勤一照彼中鄉原立價一則有益於己二則同道不怪仍可饒藥不可減價諺云不怕你賣只怕你壞一行醫及開首發藥當依經方寫出藥貼不可杜撰藥名胡寫祕方受人駁問一不可輕信人言求為學官蓋爾隻身年幼難以支持恐因虛名而妨實利也一同道中切宜謙和不可傲慢於人年尊者恭敬之有學者師事之倘有醫頭但當義讓不可攘奪致招怨謗經云禮之用和為貴一男治乎外女治乎內人之常也家中事務錢物出入當令閫政掌管庶可積蓄仍置收支工作薄以憑照用倘有餘則辨首飾器皿以備緩急不可收買玩具及不急什財浪費錢財一鄰友人情除親喪疾病慶賀隨衆外其餘無緊要者當已之一則省錢二則不廢生理至於饋送之禮尚往來不可求奇好勝古人有云廣求不如儉用一郎中磨作量其所入可用幾人莫言人多好看工價雖廉食用甚貴一開筵會客命妓作樂非不美也當有故而為之量力而行之若不守本業惟務宴逸其窘可待矣及有行院干謁送至茶筆扇帕之類初焉便不可接當贈湯藥一二帖連物回還自然絶其後患若圖風流之報故太上經曰樂與餌過客止宜細末之上前十説皆丹溪先生誨子修身齊家之節要故直言而不文當置之座隅朝夕一覽倘能遵而行之則可成家立業若不聽信必有飢寒凍餓之憂進退而難悔將何及矣蘭室誓戒一醫事本吾儒之餘事可以濟物患難中可以防身古人云養道而已切不可恃意妄為穿鑿與人為治誤人生命不惟禍及自身殃墮九祖爾但以活人之心為心本於因民之所利而利之一則生意自有二則禍患自無也一吾宗纍世簪纓名門右族吾父橘泉翁始從丹溪朱彥修學此術患難中實得濟余又得從鄉先生馮庭干許宗魯丘克容數君子印正方始道明藝精但以因虛名多受權要捃托後吾子孫遇道行時仍守儒業可也一此集本求古人為治之法如指諸掌可以見法例之變無窮病證之機不一諄諄求究藏為家寶切不可示人傳諸不道不義之士一傷寒證候宜熟讀傷寒論明理論百證歌及吳蒙齋指掌圖大抵緊要在表裡虛實寒熱二字況一證有兼證看於著緊處先之如結胸身熱發黃俱見脈沉而實宜陷胸合茵陳急下之後看次第調之是以不可執一當看證例約之一雜證看形氣實者宜以劉張大法治之形氣虛脈虛或老幼羸弱脫榮者宜以東垣之法治之藥亦不可太雜是以丹溪云吾每治病用東垣之藥效仲景處方庶品味數少藥力專精也又云以某藥治某病以某藥監某藥以某藥為引經此得人之心法也戒行吟藥術全據利澤心活人陰隲在居仁若無道誼精誠者必有神明暗伺人濟物共登同壽域修真半養自家身杏林橘井俱陳迹尚賴余芳種德新調鼎吟茫茫宇宙一乾坤調鼎工夫輩輩傳指鹿心機徒造偽問牛氣象實調元貪人敗俗淳風變良相匡時化日全四海雍熙民物阜春風花柳保年年上二詩一以見醫術行道之用心戒慎如此一以見大道之本調元之意如斯所謂達為良相不達則為良醫非流俗工技之比實非小材小智所可窺也時永樂六年歲在戊子十月望後一日中山劉宗厚甫謹識風中風大率主血虛氣虛以痰治之治痰為先挾火與濕半身不遂大率多痰在左屬死血無血在右屬痰有熱氣虛復氣初未辨內外所因多有因七情所動氣厥暴逆而昏冒牙關緊急若便作中風用藥多致殺人惟宜蘇合香丸灌之便醒謂氣復則已也中風如鋒鏑之中非感冒傷風之比也捷嚏初卒倒或中者用皂角末或不臥散於鼻內吹之汗解表表實無汗者散之劫之表裡俱實斂表表虛自汗者溫之解之表裡俱虛脈經云脈浮而大者風沉緩弱者藥用辛溫排風湯小續命湯辛平消風百解散消風散選用脈洪實用辛涼錢氏大青膏宣氣滯者難治宜吐之痰氣實能食痰壅盛者口眼喎斜不能言皆用吐法亦有虛而不可吐者下此因內有便溺阻隔故攻裡審諦的當方可施此法機要三化湯子和搜風丸老人潤腸丸雙解要略云脈微而數中風使然表裡有風熱防風通聖散川芎石膏湯風寒小續命湯劫如聖散天麻防風之類見後理氣氣滯氣鬱胸脅痞悶肩膊麻疼之類此七情也宜調氣烏藥順氣八味順氣之類理血無表裡之急血逆舉發不時大秦艽湯羌活愈風湯兼用導痰丸子治在經之病六合湯愈風湯之類表裡現證全無而血氣虛者須補之見下補氣氣虛卒倒參朮補之有痰者竹瀝薑汁以參為主本於虛者補中益氣之類加風劑補血用四物或少入薑汁恐泥痰也再入竹瀝能食者去竹瀝加荊瀝入薑汁不若湯藥下青州白丸子通關透肌骨陽證有至寶丹陰證用靈寶丹昏冒者宜用之為風入骨髓不能得出故用龍麝牛雄之類皆入骨透肌肉使風邪外出也若中血脈中腑未可用家寶丹治一切風症左癱右瘓手足痿痹口眼喎斜邪入骨髓者其病如只在肌表者不宜用否則引風入骨髓如油入面不能出川烏南星五靈脂用薑汁製另研草烏各六兩白附子全蠍沒藥辰砂各二兩羌活乳香殭蠶各三兩片腦一兩半天麻三兩麝香一兩二錢半地龍四兩雄黃一兩輕粉一兩上為細末作散調服或蜜和如彈子大含化若止風麻痹走注肢節疼痛或喑不語壅滯宜天麻散如聖救苦散治左癱右瘓風濕痹走注疼痛不止劫劑也非痛不用御米殼一兩去頂蜜炒陳皮五錢虎骨酥炙乳香研沒藥研甘草各二錢半上為細末每服三錢水一盞半煎八分連渣熱服病在上食後在下食前如煎時須一順攪之防風天麻散防風天麻川芎白芷草烏白附子荊芥穗當歸羌活各半兩甘草滑石二兩上為末酒化蜜少許調半錢加至一錢服導痰通經竹瀝湯青州白丸子三生飲皆治卒中昏冒口眼喎斜半身不遂痰涎潮上壅塞手足頑麻者抱龍丸亦妙省風湯荊瀝湯在關節手足指痛者宜神佑等丸下之清熱風本生於熱火盛水衰不能制之陰虛陽實氣怫鬱也神芎丸宣明仙術芎散通聖散之類亦有兼濕兼氣不同如兼血熱者用防風通聖去麻黃硝黃加生地生苄黃連灸風池百會曲池翳風風市環跳肩髃等穴皆可灸之以鑿竅疏風針以導氣熏如風客經絡肢體疼痛不能運動者用諸去風藥煎水如法熏之敷貼有風客肢體如痹疼痛用薑汁芥子白芷南星為末敷上口眼喎斜有用巴豆如聖散仙術四兩川芎防風白芷各二兩細辛一兩川芎半兩草烏一兩天麻半兩雄黃半兩上為末每服一錢溫酒調下各經主治藥肝川芎心細辛脾升麻肺防風腎獨活胃升麻大腸白芷小腸藁本三焦黃耆膀胱羌活心包絡川芎火凡氣有餘便是火不足者便是氣陰虛火動難治發汗火鬱在何經絡當發散降散輕則可降小便降火急速益元散八正散之類升發重則從其氣而升之升陽瀉火湯例瀉實者下之解毒涼膈調胃皆可用緩火急甚必緩之生甘草兼緩兼瀉看虛實分正從法正治人壯氣實火盛顛狂者可用正治或硝水冰飲之涼膈解毒之類從治人虛火盛或狂者用薑汁湯調辰砂益元散與之若投以冰涼涼藥立死如左金丸治肝火黃連一兩茱萸一兩逆而從之治也滋陰壯水補陰即火自降炒黃柏地黃之類鎮墜紫雪珍珠琥珀犀角雲母硃砂石膏之類輕者安神丸針各經主治藥肝氣柴胡血黃芩心氣麥門冬血黃連脾氣白芍血生地肺氣石膏血梔子腎氣知母血黃柏膽氣連翹血柴胡胃氣葛血大黃三焦氣連翹血地骨皮膀胱氣滑石血黃柏大腸氣連翹血大黃小腸氣赤茯血木通包絡氣麥門冬血牡丹皮暑熱傷氣火極陰虛注暑暑風熱極也暍是陽症暑是陰證脈沉弱者切不可用寒涼補陰虛元氣不足者清暑益氣湯陽虛補中益氣湯挾痰加半夏或生脈散宣挾火兼痰實者可用吐法暑風多痰清熱天水白虎皆可用熱悶辰砂五苓脈弦實黃連香薷有痰消暑丸清神香薷天水東垣清暑益氣湯加石膏清燥濕熱相合而刑庚金陽明病在下東垣清燥湯方消暑丸至妙夏月不可無分利熱甚自汗而渴便澀者五苓分利之桂苓甘露飲溫吐瀉脈沉微甚者可用附子大順散香薷丸桂苓丸水浸丹伏熱傷冷縮脾飲冷香飲子瀉火黃連解毒湯神芎丸劫治伏暑泄瀉身熱脈弱宜來復丹濕風濕濕熱濕痰濕腫濕痹發汗羌活仙術之類分利滲泄五苓加羌活燥羌活勝濕湯平胃之類解肌實表風濕相搏一身盡痛金匱黃耆防己湯下氣實邪勝者神佑導火舟車等丸氣虛者桑白皮茯苓人參葶藶木香之類各經主治藥肝白朮脾肺腎澤瀉胃白朮小腸車前三焦陳皮膀胱茵陳大腸秦芤心包絡茗燥有痰實血少風邪火熱消渴皆為燥降火白虎益元清神疏風麻仁丸益血滋陰血少陰虛者四物加炒柏桃仁之類清金肺熱身燥宜清金降火潤腸手陽明燥實宜與麻仁丸脾約下痰實宜滾痰丸利膈丸或三乙承氣柴胡飲子汗風熱之邪脈盛氣實防風通聖散補老人便燥澀黃耆陳皮麻仁湯各經主治藥肝當歸心麥門冬脾麻仁肺杏仁腎柏子仁大腸硝石小腸茴香三焦山藥膀胱茴香心包絡桃仁寒表惡寒者溫之內中者劫之表證見傷寒例正治主乎溫散桂枝四逆輩甚者三建霹靂散有卒中天地之寒口傷生冷之物從治熱藥加涼劑引之或熱藥冷飲經曰從而逆之反攻蜜煎烏頭之類灸陰寒及下陷脈絶者宜灸之尉寒鬱作痛灰包尉之補氣虛中寒脈沉遲弱於補中益氣加桂甚者加附子下寒積怫鬱作痛桂枝大黃湯逆而從之劫寒氣結搏附子類溫熱而不回者用金液丹二氣丹壯益陽氣各經主治藥肝氣吳茱萸血當歸心氣桂心血同上脾氣吳茱萸血同上肺氣麻黃血乾薑腎氣細辛血附子膽氣生薑血川芎大腸氣白芷血秦艽小腸氣茴香血玄胡三焦氣黑附血川芎膀胱氣麻黃血桂枝心包絡氣附子血川芎發熱有寒熱潮熱煩熱往來熱皆與傷寒中兼看如勞役熱溫疫熱痰熱傷食腳氣發熱皆不得與傷寒初治誤則殺人生斑尸疰勞瘵鬼疰皆為寒熱發熱蓋病本不同其標多相似故舉諸例於下瀉火氣實脈盛身熱煩擾宜三乙承氣湯涼膈等藥下之熱在中四順清涼飲在下八正之類涼血夜熱多或有汗或鼻衄身熱而便難四物去芎加黃連生地地骨皮之類柴胡生草知母勞熱骨蒸血青蒿蛤蚧鱉甲小麥清氣日熱多熱在氣分柴胡飲子白虎湯有暑熱從前例蒸熱氣烏梅秦艽柴胡清肌在輕手按之甚熱重手取之不甚熱此熱在肌表宜清之竹茹竹葉地骨皮麥門冬之類清神有神氣怫鬱而熱宜清神散抑火升水熱在上而陰水不升虛火沸騰宜升陽瀉火法虛者補之養陰退陽初病陽症而失於下至變似陰而不可下用白虎之類瀉黃因脾熱也實則調胃瀉黃虛則人參黃耆散導赤心熱實則瀉心湯虛則硃砂安神丸瀉白肺熱實則涼膈散虛則人參白虎湯瀉青肝熱實柴胡飲子滋陰腎熱實則滋腎丸本滋陰法也無實不可瀉下食有食傷太陰而熱或停食而下之導痰痰液不散鬱結成熱宜導開之消積因積滯而蓄熱當先消積而熱自退解毒有丹毒熱腫氣鬱結滯並可解散隨證用藥此候欲發瘡毒分六淫治鎮墜柴雪硃砂琥珀犀角之墜浮溜之火益精陰虛精耗元氣脫者用滋陰藥潤燥俱前燥法下逐血有蓄血證宜下之分利小便降火急速或有與小便單服又解肌生津例虛者補中例加木通水沃以水沃於外或令坐水中當審脈證而行之揭越汗下後元氣虛而下陷陰陽之氣揭薄而不起為虛熱宜與來復丹靈砂以揚之與地漿汗下後脈躁身熱大渴飲水不已者新掘井泉取水飲之消風有鬱冒諸風為熱宜防風通聖川芎石膏之類清金有肺燥鬱熱或火乘之者宜清之白虎加地骨補元氣不足胃氣下陷為熱補中益氣湯血虛者加血藥漬形血虛氣弱邪不能散針導氣熱病汗不出商陽合谷陽谷俠溪厲兌勞宮腕骨泄血熱無度不可止陷谷出血從治藥使酒煎或溫熱為佐使反治蜜煎烏頭之類升散其候欲發斑疹身熱宜升麻湯等藥發之涼骨肉分勞瘵熱主治藥氣血見前肝當歸柴胡心生地黃連脾芍藥木瓜肺石膏桑白腎知母生地膽柴胡栝萎胃石膏硝大腸硝大黃小腸赤茯木通三焦石膏竹葉膀胱滑石澤瀉朅劫柴胡梅連散治骨蒸勞熱三服除根胡黃連柴胡前胡烏梅各三錢上咀片每服三錢童便一盞豬膽一枚豬脊髓一條韭根白半盞同煎至七分不拘時候溫服熱住後可別調理腹痛有實有虛寒氣滯死血積熱風濕痰清痰驚痰脈滑者痰弦者食痹瘡痧疝發汗大抵風寒與濕痰在表之裡作痛宜汗之溫寒入中脘痛理中少腹小腹四逆厥陰當歸四逆湯吳茱尉寒在內急痛宜灰包尉之逐熱有濕熱作痢者宜導氣湯下之濕熱怫鬱痛隨利減針大抵實痛宜刺瀉之太衝三陰交太白太淵太陵消積脾積丸見瀉例中下食食積停滯與內消脾積看冷熱物下之通利墜肭瘡疝之類皆宜下之有懸飲為痛當下之見痰例中軟諸痛未可用參朮蓋補氣則氣痛轉甚虛者須咸以耎之灸邪客經絡藥不能及者宜灸氣海穴關元穴中脘穴外接法治陰毒牡蠣燒不灰木燒良薑炒川烏炮白芍各一錢麝少許上為細末每服一錢男病用女唾津調塗外腎女病用男唾調塗兩乳摩按風寒濕宜按摩之或用油線絞括奪命委中等處俗謂之括痧逐血有積血奔豚皆以活血通經藥逐之補傷寒腹痛臍下築動者理中丸加人參主之消郁導痰清痰多作腹痛用茗芎仙術香附白芷薑汁入湯調服托瘡有瘡在肺或腸癰脈來數而實頭痛有風風熱多主於痰濕寒破傷風下實內閉之作痛痛甚者火多血虛難治發散風邪與寒破傷風如聖散蔥酒調服宣痰留膈上氣實成郁壅盛者宜吐之消風川芎茶調散風熱防風通聖散風寒仲景加味麻黃湯清熱清空膏片子黃芩一味為末調服寶鑑石膏散散濕三因芎術湯補氣有因虛寶鑑順氣和中湯陰虛用天雄川芎類只灸亦可補血血虛者四物倍芎加石膏荊穗陰虛用補陰丸導痰青州白丸子祕藏半夏白朮天麻湯捷嚏用不臥散搐之痛甚以豬牙皂角二錢玄胡青黛些少搐鼻取涎灸疏風散寒針脈浮取腕骨京骨穴脈長取合谷衝陽脈弦取陽池風府風池下少陽偏頭痛多便閉宜下之敷瘠用傷寒汗後法敷貼細辛草烏各經主治藥陽明白芷石膏少陽柴胡川芎太陽藁本羌活太陰蒼朮半夏少陰細辛獨活厥陰吳茱當歸腰痛氣虛血虛腎虛風濕熱瘀血寒氣滯疏風小續命湯加桃仁治寒濟生朮附湯行濕濕熱用蒼朮杜仲炒黃柏川芎之類風濕東垣獨活湯痰者用南星理氣小七香丸或簡易枳殼湯行血黑神散空心酒調服脈澀者瘀血用補血調氣藥中加桃仁紅花散錯雜之邪風寒暑濕氣五積散主之補氣血虛補中益氣中加地黃杜仲脈大者腎虛用杜仲敗龜板黃柏知母枸杞五味之類豬脊髓丸針血滯於下委中出血灸腎俞昆倉補榮衛固真飲子下後藥真氣虛青娥丸方杜仲四兩補骨脂二兩下閃肭實痛豬腎散等藥下之摩腰膏附子尖烏頭尖南星各二錢半炒薑一錢雄黃獐腦丁香各一錢半麝香五粒煉蜜為丸薑汁化開成膏放手掌內火上烘摩之大抵邪在表可用或薑汁蔥亦可通關節濟生庵閭丸脅痛肝火盛木氣實有死血有痰流注肝急行血輕者用桃仁紅花川芎肝苦急急食辛以散之用撫芎蒼朮下龍會丸瀉火之要藥木氣實者承氣初痛脈氣實者十棗湯和解小柴胡加牡蠣導痰二陳加南星川芎蒼朮柴胡行氣咳而脅痛二陳南星多加香附青皮青黛薑汁木氣實或血氣兩調之捷嚏用不臥散吹之針丘墟中瀆心痛有風寒氣血虛食鬱熱散寒鐵刷湯或草豆蔻丸輕者五積散脈伏者薑附調血四物有平日喜食熱物或有衝擊死血留於胃口作痛用桃仁承氣下之行氣木香乳香玄胡益智薑黃砂仁氣虛加以二陳中加炒薑以和之實者枳殼之類補因虛而作咸以軟之牡蠣丸牡蠣一味淬為末水丸化蟲蟲痛者多面上白斑唇紅能食治以苦楝根錫灰之類清熱胃口有熱而作非梔子不可佐以薑汁此反佐也金鈴子散見活法機要針太溪然谷尺澤行間建里太都太白中脘神門湧泉消導元戎厚朴丸感應丸宣銅青之類蘿蔔子三大合炒擂細濾之空心茶湯和下大鐘漸漸濃服取吐下大實滿痛者元戎厚朴丸備急丹大陷胸湯蟲痛三因集效方牙疼或出血屬熱胃口有熱有風寒濕熱蟲蛀疏風川芎石膏升麻細辛草烏白芷防風羌活擦之或單用鶴蝨一方用升麻石膏細辛藁本檀香麝香皂角行濕細辛芫花蒼耳葉大戟小麥川椒煎水漱之清熱石膏升麻地骨皮羊脛骨灰解鐵雜之邪東垣當歸龍膽散治寒熱用元戎梧桐淚散下神功丸涼膈散調胃承氣湯為末蜜丸服之行血牙疳蝕臭出血當作陽明蓄血治之桃仁承氣湯蜜丸服之東垣清胃散有服牛尿漱而得血者立愈散寒草豆蔻白芷細辛草烏丁香蠍梢取皂角樹上蛾子或白馬蛆或用草烏川椒細辛益腎腎虛者骨熱而蘇蘇然痛者滋腎丸灸頰車聽會曲池熏用韭子治蟲天仙子燒煙用竹筒抵牙引煙燻之其蟲即死針合谷內庭浮白陽谷三間擦藥元戎問玉散方醋榴皮訶子各二兩升麻何首烏緑礬枯青鹽百藥煎五倍子沒石子各兩半麝一錢白茯菟一兩細辛石膽礬各半兩荷葉灰白檀芎芷甘粉苓苓香茴香藿香豬牙皂角灰木別子各二錢青黛一錢半共為末眼目疼者肝氣實風熱痰熱血瘀熱血實氣壅諸邪風熱羌活甘菊川芎蔓荊子荊芥穗火酒炒芩連大黃當歸生地防風薄荷濕熱神芎丸風川芎茶調散涼血實者犀角地黃湯加芩連荊穗石膏柴胡虛者四物加黃連生地黃草荊穗枳實清氣實者涼膈虛者清心蓮子飲局方定志丸茯菟人參各三兩遠志菖蒲各二兩蜜丸辰砂為衣針絲竹空上星百會攢竹宣泄痛者風池合谷導痰行氣二陳加枳殼川芎仙術石膏荊芥瀉肝瀉青丸羊肝丸白羊肝一具黃連末養陽東垣神效黃耆湯滋陰地黃丸二者兼治東垣滋陰地黃丸消翳膜方甘菊川椒木賊蒺藜子密蒙花蛇蛻蟬蛻川芎蔓荊子荊芥穗石燕黃連薄荷葉枳實栝蔞根羌活當歸甘草上為末蜜丸含化灸大寒犯腦連及目疼或風濕相搏風邪皆可用有翳取二間合谷宣痰實氣鬱宜吐之然後用藥下熱勝氣鬱承氣湯血實玉燭散洗湯泡散黃連杏仁當歸防風點藥末子用爐甘石不拘多少淬後為極細末點先用童便淬後用黃連汁淬之熊膽膏黃連黃柏各三兩蕤仁一錢去油先將三味煎濃汁濾過入後藥熊膽一錢硼砂半錢牛黃半錢腦子四錢蜜四兩和淨水熬瀉痢氣虛兼寒熱食積風邪驚邪熱濕陽氣下陷痰積當分治瀉輕痢重升散胃風湯防風芍藥湯神朮散蒼朮防風湯敗毒散皆可汗之攻裡濕熱用導水丸兼郁承氣湯和中丸積滯用聖餅子脾積丸冷積局方蘇感丸下後用藥調理痢初得者必用下通因通用濕熱甚者宣明玄青膏和氣後重窘迫用木香檳榔白屬氣赤白者氣血受病赤黑相兼屬濕熱青緑雜風與火濕涼血下血者當涼血歸苄赤屬血保命集四物加槐花黃連米殼溫脈沉弱而腹痛用薑附加對五苓理中丸機要漿水散色青者寒兼風升提陽氣下陷升陽益胃加桔梗醋沃南星用一葉梅外貼極效起泡便止收斂實腸散桃花湯養臟湯嚴氏烏梅丸元戎烏梅散如米殼榴皮龍骨之類勝濕平胃散曲芎丸之類老人奉養太過飲食傷脾為脾泄機要白朮芍藥湯茯苓湯濕勝仙術炒用滲泄陰陽不分淡以滲之五苓豬苓之類或單用薏苡實炒為末服之補初不可便補氣虛者補中益氣血虛神弱人參白朮當歸川芎炒芍藥茯苓少加黃連之類錢氏白朮散十全大補湯劫瀉痢脈沉伏細弱下陷者用來復丹靈砂丹以劫之清暑中暑暍而脈虛者香薷散桂苓甘露清暑益氣湯灸陷下則灸之脾俞關元腎俞復溜腹哀長強太溪大腸俞三里氣舍中脘解熱外熱者先退熱柴芩連內熱者香連丸芍藥柏皮丸黃連阿膠丸噤口者解毒分利胃苓湯與淡滲同五苓或獨用芣香散外貼以一葉梅於印堂貼之宣有痰飲在膈上氣不能降以致大腸不能收斂而瀉利痰在肺中宣大腸之不固也宜吐之盒臍噤口痢用田螺於臍中盒之以引下其熱黃連多加參朮終日呷之如吐再進補腎腎泄久不止脈沉細無力二神丸本事五味子散金鎖正元丹和脾氣脾氣不和濁氣下干不能愈者問病人思食何物與食之脾氣和而愈矣消積因積作者脾積丸方見後青皮陳皮三稜炒蓬朮煨各二錢莎實二兩炒肉果山豆炒山楂丁香砂仁檳榔薑黃厚朴炒各二錢黃連三錢木香一錢半檀香二錢澄茄一錢白豆蔻一錢麥蘖炒二錢上為末蠟為丸如緑豆大每服二三十丸溫水下瘧又名痁有風暑山嵐瘧氣食老瘧瘧母寒濕痹五臟瘧六腑瘧發散有汗要無汗正氣為主帶散之小柴胡加桂白虎加桂頭痛脈浮惡風有汗機要桂枝羌活湯和解無汗要有汗散邪為主帶補之桂枝加黃耆知母石膏湯人參柴胡飲子六和湯方人參知母草果貝母白芷檳榔各一錢烏梅柴胡各一錢用酒拌常山二錢溫寒多熱少或但寒不熱名牡瘧宜柴胡薑桂湯此溫經也下熱多寒少目痛多汗脈大以柴胡微利為度餘邪未盡白芷石膏知母三物湯以盡其邪調經風暑深入陰分而夜發者乃血受病宜桂枝桃仁當歸柴胡黃芩等藥闢瘴氣草豆蔻厚朴草果檳榔半夏常山溫脾內傷生冷於平胃中加參守田茯苓草果藿香薑烏梅輩飛龍奪命丹亦可用消癖咳瘧多成癖在左脅之下名瘧母嚴氏鱉甲飲子金匱鱉甲煎丸消食三因紅丸子宣因外感病屬上焦胸膈多結聚痰涎故宜吐子和恆山散藜蘆散雄黃散截辰砂丹一剪金皆要藥也硃砂一兩半留五錢為衣信雄黃各五錢上為末入白麵六錢水丸緑豆大每一丸於五更時水下補汗多寒熱不止懶言語食少小柴胡加桂白朮陳皮當歸草果皮芍藥黃耆知母貝母不止者兼服後藥三日一發或一月兩月發者祕方清脾丸白朮一兩半人參檳榔草果黃芩守田制各一兩青皮一兩蓬朮醋炒厚朴各半兩甘草薑黃各三錢上為末飯丸如梧桐子大每五六十丸食遠白湯下日進二服移精變氣或驚之擊之藏隱照水飲符觀盡奕棋皆可止之邪傳裡則不能止針合谷曲池公孫灸不問男女於大椎中第一節盡處先針後灸三七壯立效或灸第三節亦可咳嗽風寒火勞痰肺脹濕五臟咳看痰例分六氣治為要發散風消風散金沸草散寒麻黃湯乾薑五味子湯下濕十棗湯小胃丹葶藶木香散水葶藶丸胃實痰鬱者下後調理宣痰在膈上或停郁胃中重者瓜蒂散輕者蘿蔔子末吐之瀉火實者解毒湯輕者知母地骨桑白皮麥門冬桔梗甘草礞石滾痰丸上半日屬胃中有火貝母地骨五更咳者此胃中有食積至此時流入肺中滋陰午後嗽多者屬陰虛四物知母黃柏或四物入竹瀝或六味丸或八味丸為要藥收斂火氣浮於肺不宜用涼藥以五味五倍斂而降之或粟殼烏梅之類肺脹者訶子青黛杏仁久咳自汗宜用之瀉白肺氣有餘宜瀉之桑白為主半夏茯菟佐之瀉其有餘補其不足清金肺燥當潤之屬熱者桔梗大力知母雞清聲啞者屬寒細辛半夏生薑辛以散之補肺虛者人參膏補之阿膠為主陰不足者六味丸為要藥知母茯苓湯炒咳而瀉者痢者用粟殼不必疑熏款花雄黃艾燒煙燻入喉中以散肺中邪氣丹溪治久嗽風入肺者用鵝管石雄黃鬱金款花碾末和艾中以生薑一片留舌上灸之以煙入喉中為度灸天突肺俞肩井少商然谷肝俞期門行間廉泉扶突針曲澤治咳喘出血立已前谷穴兼胸滿面赤熱咳支溝多唾三里導痰食痰瑞竹堂方化痰丸熱滾痰丸濕葶藶桑白風痰青州白丸子行氣二陳加南星紫蘇桔梗枳殼之類桑白皮燥者杏仁蘇子熱者兼荊芩連知母涼血熱傷血分宜生地地骨知母麥門冬阿膠甘草桑白皮桔梗紫菀五味荊芩劫藥五味半兩甘草二錢半五倍一錢風化硝一錢上為末干含化一方粟殼四兩炒烏梅一兩人參半兩款花半兩苦梗半兩兜苓一兩南星薑製一兩上為末蜜丸彈子大含化汗多者用之吐衄血身熱多是血虛血溫身熱者死不治火載血上錯經妄行瀉火嘔吐血出於胃犀角地黃保命生地黃散柴胡黃連黃芩黃耆地骨生熟地黃白芍調榮衄涕血出於肺犀角升麻丹參紫參生地芍藥黃芩咯唾血出於腎紫菀知母熟地遠志門冬痰涎血出於脾葛耆黃連芍沉香甘草虛者小建中加黃連或前保命生地黃散再加天門冬枸杞子甘草等分水煎服調衛分氣紫蘇飲由七情致者針隱白脾俞上脘肝俞下血結胸中心下手不可近為中部蓄血桃仁承氣湯小腹硬滿小便自利大便反黑臍下手不可近為下部蓄血宜抵當湯嘔吐血宜三黃湯順下之調理脈大而熱或喉中痛是氣虛用人參黃耆蜜炒黃柏荊芥生地地骨當歸頭咯血用桑白皮半夏知母貝母茯菟阿膠桔梗陳皮甘草杏仁生地之類衄血及嗽以上藥加蒲黃五倍灰入煎劑服妙外迎以井花水濕紙於頂中貼之左鼻衄以線扎左手中指右出扎右中指俱出左右二指俱扎或以炒黑蒲墨吹鼻中清熱降火二陳加知母桑白桔梗黃連黃芩生地石膏之類煎藥水和入墨汁服溺血屬熱氣虛血虛涼榮四物加生地牛膝或四物加黃連棕灰六味地黃丸切要補氣莖痛用甘草梢血藥中少佐以地榆陳皮白芷棕灰劫瑞竹堂方蒲黃散蒲黃炒古石灰炒破故紙炒為末調服或單用蒲黃或蔥白湯調鬱金末服之文蛤灰入煎劑妙下血腸風多在胃與大腸病清熱補血四物加炒梔子炒黃連秦艽升麻阿膠棕皮下槐角丸溫因寒致者當溫散四物加升麻炮薑棕灰或腸胃受寒濕毒宜當歸四逆平胃之類灸三里針隱白解絡脈之結或單用枳殼一味一方黃連一兩枳殼二兩槐花八兩上以槐花炒上二味去花不用止以二味煎進立效劫一方用百藥煎一兩取一半燒為灰作末糊丸梧桐子大每五六十丸空心服之一法用血餘灰棕櫚皮灰鞋底灰豬牙皂角灰酒服半兩諸氣怒則氣上驚則氣亂恐則氣下勞則氣耗悲則氣消喜則氣緩思則氣結升散寒氣鬱於中作痛七氣湯鹽煎散參蘇飲東垣升陽順氣湯降抑逆者抑之木香流氣飲降氣湯有熱者須加涼劑抑之所謂從陰引陽也下木香檳榔丸導氣丸小承氣湯針針以導氣調理沉香降氣湯分心氣飲紫沉通氣湯補炅則氣泄宜清暑益氣湯宣木鬱則達之捷嚏搐鼻消導局方異香散導痰散郁和中二陳四七蘇子降氣之類理血氣逆血從濟生歸脾湯漏內托提二地耆參朮升草菟芍外塞法用童便煅爐甘石牡蠣粉淋屬熱小便澀氣承水寒閉熱結痰氣不利胞痹屬寒解熱關格者分利之涼血火府丹木通黃芩各一兩生地二兩不渴而小便閉者滋腎丸知母黃柏補老人氣虛人參白朮中加木通山梔六味丸為主氣虛不運者加升麻虛寒者八味丸為要藥灸三陰交掩臍連須蔥三莖生薑一塊豆鼓二十一粒鹽一匙同搗作餅烘熱掩之扎定即通宣吐之以提其氣氣升則水自下以二陳吐之吐中便有降關格必用吐提其氣之橫絡不必在出痰也下八正散之類捷嚏不臥散吹之外迎湯浴之擦用連須蔥擦周身降氣八正中加木香沉香琥珀清氣蓮子飲寒者溫之三因生附散小水不禁補內虛寒自汗御藥祕元丹三因家韭子丸內虛濕熱者六味丸寒者八味丸加杜仲骨脂五味灸陰陵泉陽陵泉閟詳淋不通者用以上法或用坐藥見傷寒例男子急甚者令人吹吮之婦人仍用坐藥喉痹痰熱濕熱宣以桐油吐或以射干逆流水吐一方槐花獨活醋煎吐涎三因雄黃丸雄黃一兩巴豆去油十四個鬱金一錢醋糊丸緑豆大茶清下七丸吹藥三因玉鑰匙焰硝一兩半硼砂半兩腦子一字殭蠶一分金鑰匙加雄黃或止用膽礬一字散雄黃蠍梢白礬枯藜蘆豬牙皂角炙各等分為末每用一豆大放鼻內搐之解陰陽之結連翹麥門冬桔梗甘草大力子薄荷山豆根半夏牡蠣木通針合谷湧泉天突豐隆灸起初傍灸之蓋亦鑿竅使外泄也頸腫針曲池二穴導痰痰不降而致桔梗半夏湯寒痰三因玉粉丸熱者滾痰丸下脈實氣盛火甚者涼膈散下之氣虛老人勿輕用血熱柴胡飲子氣熱碧雪風熱用通聖散疏風大力子桔梗半夏薄荷甘草防風荊穗射干牛膝山豆根當歸黃芩竹瀝溫有下虛陰盛格熱在上切不可用涼藥脈沉緊細小者是也宜桂附溫下之藥上用半夏桔梗之類諸瘡初起者疔疽發背便蒸之或毒下陷亦可用方別內托發汗在背羌活為主在面白芷在肩脅柴胡在胸腹白芷升麻東垣最妙脈數滑浮大者宜東垣消毒散沉細者十補散滑數瘡在下宜當歸拈痛湯蒸蒜片或白芷木鱉為末蜜和作餅用多年冷瘡用附子片下脈實瘡腫焮便閉宜內疏黃連湯汗多脈大譫語破棺丹從治有因食一切毒物及死驢馬肉而發瘡腫者有濕毒等致宜服後藥飛龍奪命丹治一切疔瘡惡腫癰疽初發或發而內陷者如熱毒脈盛宜後飲子天南星雄黃巴豆各一錢碙砂黃丹信石乳香各半錢班虎十六個去翅皮麝香少許上為末取蟾酥和丸如黃黍米大每十一二或十四五丸看瘡上下食前後好酒送下忌食諸般肉油膩七日一方有礬一錢半夏一錢無雄東垣黃連消毒飲治癰疽發於腦頂或背腫勢外散熱毒焮發麻木不痛宜灸之黃連酒炒羌活各一錢黃芩黃柏各半錢酒炒生地知母炒獨活防風歸尾各四錢連翹四錢藁本防己桔梗各半錢黃耆蘇木陳皮澤瀉各二錢人參甘草各三錢上咀片作一服水煎服若腫勢已過宜後方復煎散地骨芩苓參耆芍白朮桂甘草防己當歸各一錢防風三錢作一服先取仙術三錢煎水煎灸瘰癧瘡須灸之肩井二穴曲池前骨端二處內作散腫潰堅丸一二料服之雙解厥逆咽塞寒熱五香連翹湯風熱防風通聖散脈實丹毒千金漏蘆湯內托脈虛胃熱復煎散聖濟托裡湯東垣黃耆人參湯黃耆湯外治有膿者開之久瘡肉冷者蒸之敷藥初起用濕山藥少加木鱉萆麻搗敷消反肉青金錠子選用之下濕瘡用文蛤散郭氏水澄膏敷紅赤色攻焮疼痛針緣唇瘡須去惡血下注瘡亦然漏瘡補用人參黃耆白朮川芎當歸為主以生氣血有濕熱者先下後用熏蒸用附末唾和如餅若半指厚上用艾蒸之五七次肉平為度或只有茝末亦可疥濕熱濕毒外治脂調散苦參荊芥雄黃硫黃礬末各半兩蛇床二兩草烏尖一兩為末敷之汗通聖散加羌活獨活白芷兼服苦參丸下顯仁丸必用之熏硫黃艾洗針風癬外治脂調散或豆瀝胡桃瀝搽一方雄黃三錢半柳皮剪草各一凡芨半班虎七個草烏尖汗換肌散苦參丸苦參二殭蠶一茝一為丸服下重甚舟車禹功或顯仁丸痔瘡甘草二錢生用用米泔水調服之一方大黃煨三錢牡蠣煅一兩為末作十服空心服效熏用無花果葉煎水熏少時再洗好醋沃燒新磚如法坐熏點以藥點蝕瘡去之涼血槐角丸下血者劫之滋陰地黃丸必用之空心服一百丸地黃丸方槐角炒柏炒杜仲炒茝各一兩山藥山茱萸獨活各八錢澤瀉丹皮茯菟各六錢黃耆一兩半熟地一兩六錢白附二錢蜜和為丸世俗坐臥熊皮上極效皮襯鞋底亦妙臁瘡熏初起者即愈用熟艾於小罐內燒煙燻之敷大扎草灰貼蠟膏紙入油些少乳香些少更妙或只用文蛤末一方黃連五蛤粉四輕粉一黃丹一枯礬半下顯仁丸下注瘡只用當歸拈痛湯效或作丸服疝因寒氣濕熱痰積流下㿗不痛者是也溫酒煮當歸丸奪命丹十補丸按之痛定者屬虛桂炒梔子烏頭薑汁糊丸劫痛第三四十丸服海石小茴香入薑汁湯調下或鹽煎散烏頭桂枝湯導氣郁甚復元通氣散天台烏藥散上病尿時用手掩右口鼻耳少時效右則取右疏風大抵多是肝病滲濕五苓加川楝下三白散控引睪丸蜘蛛散選用之灸大敦三陰交一法於臍中蒸之一法於小腹下橫紋斜尖上灸一壯以下連灸三處神效針太衝大敦跳骨足小指下行血有食積與瘀血成痛者炒梔子桃仁山楂枳實吳茱萸荔核薑汁糊丸消㿗外腎囊偏大用荔核橄欖核鼻涕團果核共燒灰空心用小茴香湯調下腳氣濕熱食積流注風濕寒濕勝濕仙術白朮防己川芎為主或六物附子湯濕熱當歸拈痛湯下顯仁丸兼氣鬱甚者舟車丸除濕丹有飲者東垣開始導飲丸劫如神救苦散一粒金丹應疼丸方在後赤芍半兩草烏半兩各煨去皮尖酒糊為丸解表麻黃左經湯等藥隨證選用有兼痰氣寒濕五積散雙解大黃左經湯選用東垣羌活導滯湯理血八味丸四物湯加羌活天麻或四物加黃柏南星或健步丸補陽黃耆防己白朮桂南星木瓜茯菟通關透肌骨三因勝駿丸疏風養血獨活寄生湯外治敷貼用薑汁芥子白芷等為末敷糝或用仙術羌活獨活白芷細辛為末入帛內㩢用尉腳心用附子末津貼湧泉穴卻以熱尉之洗藥威靈仙防風荊芥地骨當歸升麻朔藋針公孫二穴衝陽二穴灸三里轉筋屬血熱濕熱涼血四物加黃芩紅花南星溫筋寒者溫之痿濕熱痰無血而虛氣弱瘀血燥濕東垣健步丸導痰二陳加仙術白朮竹瀝炒黃柏之類補血四物加炒柏仙術下補陰丸或四斤丸八味丸或四物中加桃仁紅花補氣益氣湯加仙術炒柏下顯仁丸甚者丹車丸行後便收拾調理灸三里肺俞針須停待氣至一二時或三時方可中瀆二穴環跳二穴內傷傷食有有餘有不足傷力者多不足下食有餘鬱積先下之甚者備急丹承氣下傷力初得甚者當歸承氣湯調理食過傷元氣東垣枳朮丸橘皮枳朮丸熱物芩連枳朮丸補補中益氣湯傷力用桑白皮參朮陳皮當歸加降火藥宣食在上不得下消導在中焦痰飲痰之為物隨氣升降無處不到亦有脾虛而痰飲作者有五飲宣寸脈實當吐痰在上瀉亦不去吐中有發散之意桔梗參蘆瓜蒂藜蘆牙茶選用消導食積瑞竹堂化痰丸錢氏白餅子痰在四肢非竹瀝不開在脅下非白芥子不能達熱痰青黛黃連滾痰丸二陳加芩連濕痰小胃丹神佑丸輕者二陳湯寒痰薑桂丸溫中丸五套丸風痰青州白丸子玉壺丸天南星丸驚痰辰砂化痰丸保生錠子發散風寒外感金沸草散三拗湯因郁參蘇飲下祛痰丸有痰實似邪祟狂證滌痰丸大利膈丸蠲飲枳實丸有懸飲內痛十棗湯或三因控涎丹理氣四七湯蘇子降氣湯滋陰半夏止能泄痰之標不能治痰之本腎氣丸以主之海粉熱痰能降濕痰能燥結痰能軟頑痰能消可入丸子不可入煎藥鎮墜痰飲升降陰陽靈砂丹黑錫丹來復丹喘未發以扶正氣為主已發以攻邪為主有外感邪盛補氣虛短氣用人參蜜炙黃柏麥門冬地骨阿膠桑白皮降痰有痰亦短氣而喘導痰湯方半夏南星陳皮枳實茯苓甘草滋陰陰虛自小腹下火起而上者地黃丸年高痰喘不定者必用此仍茯菟與地黃等分疏利風痰婦人大全良方千緡湯方半夏皂角炙草生薑降火有熱甚而喘泄水有水乘肺而喘葶藶牽牛之類降氣導氣湯蘇子降氣湯氣實導氣下行潤燥款花膏下有胃實壅遏以承氣湯下之氣實者下之劫椒目為細末一二錢用薑汁調下止之又蘿蔔蒸熟為君皂角燒灰等分薑汁煉蜜丸梧桐子大服五六十丸劫後看證用藥溫外感心下有水氣乾嘔而喘小青龍去麻黃加杏仁主之哮專主於痰必用薄滋味宣宜春初吐之導痰順氣清肺養正之藥霍亂內有所積外有所感宣就微吐之以提其氣或用樟木湯吐亦可解散乾霍亂不用涼劑二陳加川芎仙術防風白芷分利嘔吐有熱有痰寒停食清熱胃口有熱膈上有痰二陳加薑黃連滋陰還少丹腎氣丸溫理中丸不二丸導滯有積滯毒氣上攻而嘔者下有食用內消丸清鎮燒針丸必用之滲泄水逆者五苓散主之補久病者胃虛不納穀也人參黃耆白朮陳皮之類噁心痰熱虛辛散皆用生薑隨證用藥灸嘔吐噁心胃俞幽門商丘中府石門膈俞陽關膈噎即翻胃血虛氣虛熱痰兼病血積癖積補氣四君子加蘆根童便或參苓白朮散或韭汁牛羊乳或入駁驢尿補血四物加童便血病不可服香燥之藥服之必死消積有用阿魏香附砂仁仙術陳皮山豆枳實木香歸鬚桃仁黃連之類溫胃以馬雹兒燒灰存性每服一錢用棗肉平胃散二錢和入酒調下丁沉透膈湯小七香丸逐滯血多有積血停於內而致當消息逐之大便澀者多難治常令食兔肉則便利行氣木香流氣飲嘉禾散清鎮燒針丸針初病者取天突穴導之石關二穴疸濕熱寒熱食積發汗三因麻黃醇酒行濕茵陳五苓加食積藥下黃連梔子茵陳枳實厚朴大黃搐鼻在上者用瓜蒂搐之取下黃水消食溫陰黃當溫經燥濕灸消渴上消則多飲水而少食渴而飲食多便赤為中消下消則膏淋面色黑而瘦養肺降火人參白虎湯東垣蘭香飲子麥門冬飲子滋陰八味丸丹溪補陰丸清鎮硃砂黃連丸三因珍珠丸生津補氣血東垣生津甘露飲子下謂胃承氣湯潤燥黃連末天花粉末生地汁生藕葉和入牛乳佐以薑汁蜜或單用浮萍汁水腫五臟水為證不同皮水正水石水風水內因氣濕食行氣削積重者踏腫丸輕者大橘皮湯神金散下三聖散枳實蘿蔔子牽牛為末看大小與服氣實三花神佑舟車禹功選用之苦瓠丸利機關用腎氣須茯苓與地黃對用平胃為衣稍實者下後用此潔淨府也實脾土脾虛不能制水水漬妄行當燥脾補虛為主切不可下對金飲子脾積丸滲泄桑白葶藶大橘皮湯五苓之類瞥苡蒸用湯以法坐熏之繆刺脈盛氣實者可用胃倉穴合谷石門水溝三里復溜曲泉四滿消導有食傷太陰而浮腫如水者因積滯看寒熱分消丸開鬼門謂發汗也鼓脹消導氣脹清熱行氣中滿分消丸寒脹中滿分消湯補中行濕此脾虛之甚大劑參朮陳皮茯苓仙術行血有血積潔淨府小便澀者宜竟滲利之下脈實人壯盛者下之便用收拾行氣厚朴治脹因味辛散一法用大蝦蟆一個入豬肚內煮熟去蟆不用病人一日吃盡遂愈神妙滋陰無陰則不能化故脹故藥加芩連類針上脘三里章門陰谷關元期門行間脾俞懸鐘承滿自汗氣虛濕熱陽虛助陽參朮中佐以桂枝甚者附子下火氣上蒸於胃作汗者涼膈散補心虛者礪粉丸補之撲斂牡蠣麩皮麻黃根藁本糯米防風白芷為末周身撲之封臍何首烏末津調封之消導脾胃有食積熱而自汗須導之脾積丸盜汗血虛陰虛小兒不須治涼血補血生地當歸黃耆黃連黃柏黃芩甘草麻黃根浮麥實脾斂肌白朮四兩用黃耆牡蠣麩各分一兩炒過只用術為末每服三二錢補文蛤末為丸湯下二十粒劫何首烏為末唾調安臍內吃逆痰氣虛陰火補虛者參朮中下大補丸輕者乍得用思以勝之溫胃寒理中湯下便實者下之宣氣實脈盛有痰者必吐之頭眩或運痰挾氣虛火積其痰脈大是久病利痰清熱南星半夏桔梗枳殼陳皮甘草茯苓黃芩之類疏風川芎茶調散兼熱痰二陳加羌活仙術黃芩青州白丸子降火滾痰丸清空膏導飲蠲痰丸消食有內傷停食挾痰而致活血脈澀有死血補氣虛者參朮耆歸陳皮甘草之類搐鼻濕甚者牛末吹之針上星風池二穴天柱痛風風熱風濕血虛有痰發散仙術南星川芎白芷當歸酒炒黃芩防己桂甘草在上加羌活威靈仙在下加牛膝木通炒柏寒小續命湯風天麻防風散調理皮骨散虎骨酥炙二兩花蛇酒浸取肉天麻防風川牛膝殭蠶炒歸酒浸乳香另研桂心各二兩炙草全蠍半兩麝香一錢上為末每服二錢豆淋酒調下補血多用芎歸佐以桃仁紅花疏風勝濕南星仙術炒柏為主佐以臺芎白芷桂桃仁防己有濕勝一身盡痛小胃丹浚川散導痰青州白丸子針百會環跳灸肩臂痛導痰行濕仙術半夏白朮南星炒芩香附陳皮荊芥威靈仙針灸肩髃曲池癖塊在中為痰飲在右為食積在左為血積氣積癥瘕聚消削五臟積隨證治之見玉機微義積聚門血醋煮海石三稜蓬朮桃仁紅花五靈脂香附歸鬚乾漆之類氣御藥院方助氣丸痰滌痰丸癥瘕宣明積氣丹肉丹溪阿魏丸酒鄧山房感應丸食丹溪保和丸脾積丸見瀉痢例中下因熱千金硝石大丸積踏腫神應丸鬼物八毒赤丸白馬尿亦能行或單服之消導用行氣和血煎藥下磨積藥從湯蕩之祕方脾積丸因氣血弱者攻補兼之鉤邪有鬼物必須鬼物以鉤之用死人枕煮服敷貼以大黃朴硝大蒜鴿糞為膏敷痞上又煮蝦蟆食法見前鼓脹例中尉蒸牽牛蘿蔔子枳實為末置於上以艾火蒸之養正養正氣實而積自除有隻用舊砂鍋為末作丸服之效針中脘建里石關商曲倒倉見玉機微義積聚門灸外貼以一葉梅貼印堂起泡去之痞食積與濕散郁開痰橘半枳朮丸三稜丸宣見心痛蘿蔔法導滯輕者枳丸茱連丸陷胸湯又煮蝦蟆食法見前鼓脹例下噯氣胃中有火痰氣鬱滯隨證治之吞酸有熱者必順其性而折之用吳茱黃連濕勝者七香丸嘈雜多是痰食鬱有熱薑炒黃連不可無夢遺脫精專主濕熱虛固真縛虎飲子見腰痛補例補氣血虛與八物湯下珍珠粉丸燥濕珍珠粉丸方黃柏知母牡蠣粉蛤粉清熱安神青黛海石柏灸濁濕熱痰虛赤屬血白屬氣燥濕濕痰流注於二陳中加仙術白朮赤者加白芍仍用珍珠粉丸清熱脈弦滑者青黛滑石柏燥痿南星守田海石以神麯糊為丸青黛衣補氣血虛縛虎飲子下珍珠丸心虛宜定志丸下熱在下氣實者導水丸癇大率行痰為主清熱養氣血寧神丹天麻人參陳皮白朮歸身茯神荊穗殭蠶獨活遠志犀角麥門冬棗仁辰砂各五錢守田南星石膏各一兩甘草白附子川芎鬱金牛黃各三錢珍珠三錢生地黃連各半兩金箔三十片共為末酒糊為丸灸百會鳩尾上脘神門健忘精神短少者多亦有痰者隨證治之清熱養血安神丸小黃丸合服之順氣清神補中益氣加石膏荊芥芎怔忡大抵屬血虛有慮便動屬虛時作時止者痰逐火動瘦人是血少肥是痰補補中益氣湯加生地石膏荊芥穗宣氣實者用倒倉法見積聚門玉機微義導痰清神調中益氣丹方人參歸身茯神遠志乾山藥生地酸棗仁辰砂陳皮各一兩白朮一兩半牡蠣煅二兩麥門冬黃連各半兩生甘草一兩枳實炒七錢半夏制八錢上為末酒糊丸如梧桐子大每服四五十丸食遠白湯下驚悸屬血虛痰熱隨證治之耳聾疏風疼者用五倍末全蠍末綿裹塞之茶調散人乳和萆麻子肉棗作膏塞耳中清熱開痰清神散合二陳宣蘿蔔子半兩炒為末調白湯作三二次空心服而吐之解鬱有因七情致者隨氣治之痹風寒濕發散風寒濕三氣合為行痹上下左右無定宣明防風湯溫經寒勝為痛痹四肢疼而浮腫宣明茯苓湯濕勝為著痹四肢麻筋攣腫茯苓川芎湯潤膚滋腎在血脈之中隨上下不通摩擦薑汁蔥泥周身擦之灸疏風養血通聖散去硝黃加白芷羌活為末服之導痰飲有因支飲手足麻痹多唾眩冒守田赤茯苓陳皮枳實桔梗甘草名茯苓湯厥捷嚏初得厥而不知人事宜不臥散吹擂調氣先用蘇合香丸灌之醒後看虛實治升發卒厥暴死飛尸鬼注鬼擊客忤三因追魂湯即麻黃湯宣或七情痰氣所致故宜吐之白子末湯調服之吐清熱養氣白虎加人參湯虛甚者獨參湯溫表熱內寒下利清穀食入則吐或乾嘔或汗四肢冷拘急身體痛不渴四逆湯癭常服芩連枳朮丸仍含後丸用昆布海藻帶各二錢大力四錢炒為末如後用效耎散瓦松海藻昆布海帶豬羊靨子和為丸如彈子大每丸含化之導痰氣三稜丸癩此是感天地殺厲之氣聲啞者難治下蟲病在下通天再造散取蟲及穢物方鬱金一錢大黃一兩白牽牛六錢半生半熟皂角刺一兩陳者共為末酒下五錢取涎病在上用醉仙散於牙縫中追毒取涎方見後發散痛者養血藥中加如聖散疏風清熱防風通聖散加生地羌活獨活大力子白芷蔓荊子宣氣實痰壅者宜吐汗之換肌換肌丹方當歸苦參各二兩川芎撫芎防風荊芥穗川羌活獨活金蠍蟬蛻各一兩半共為末大楓子三斤取淨肉一斤上楓肉搗如泥和陳米飯為丸每服四十丸空心至晚各進一服針出惡血取委中二穴針之去惡血二三合又黑紫疙瘩處亦去惡血涼血瀉火四物加生地荊芥穗黃耆黃連地骨甘草黃芩之類潤膚大楓子枯礬輕粉苦參白芷為膏潤之癢者加白芨硝雄黃追涎鼻塞者用豬牙皂角十條微泡去皮玄胡索大者三枚青黛半錢共為末滴水丸如雞頭大曬乾每一丸以水浸開口含水以藥搐鼻中其涎自出後以水漱口自止醉仙散方服五七日後牙縫中出涎胡麻鼠黏子枸杞子蔓荊子各一兩同炒白蒺藜苦參防風栝蔞根各半兩上為末每十五錢入輕粉一錢茶湯調下洗浴雄黃研生用臨時下黃柏槐花麻黃苦乾薑各一兩只為粗末用水一桶許浸五日令藥水濃卻煎數沸去渣入缸或大桶內令滿坐於內沒身汗出為度其蟲取下遠去其水於僻處理藏換新衣著大忌色欲口味雙解烏蛇丸方皂角去皮弦子二十定酥炙白花蛇烏蛇各一條並酒浸去骨焙乾苦參四兩大楓子三斤內取淨肉一斤共為細末以皂角十三定捶碎以水五升浸一宿濾去渣熬成膏和前藥為丸桐子大每三十丸欲利溫酒下以利為度欲汗通聖散汁送下三日服一遍汗出為度斂瘡藥風癢多用尋常少用紫荊皮四兩白芨赤小豆斑蝥去足翅明礬全蠍各二錢半上為細末水調塗敷其瘡直到了不換痊後其痂自落白癜風瑞竹堂追風丹一法臘八日取活兔血和酒服之紫癜風雄黃白附子草烏尖末和薑汁擦之下疳瘡敷好茶二錢川椒半錢為末貼之蟾乾者燒灰貼之亦可洗後敷之又方五倍子炒吳白芷荊芥穗黃柏共為末貼骨梗咒密咒云洪穎登樓奉帝敕吾敕真人化此辰急急如敕令向北七遍
