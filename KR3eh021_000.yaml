front:
  text: 序豫自髫年入郡庠讀書之餘有志醫術又恐工夫分用急務相妨竊嘆此術自為之固不及若得前聞人良方録傳不惟及於一家一國且遍於天下而傳於後世豈不愈於身親為之者耶博訪旁求纍月經年無可意者逮舉天順己卯鄉試乙未中進士觀政戶部奉命給賞甘州官軍甘州即漢張掖酒泉郡也而名醫劉宗厚神方妙術猶有存者乃延其後人禮貌之懇求之慨然以太素脈訣雜病治例見與豫如獲隨珠趙壁喜不自勝連日檢閲研究知其切脈辨證療病用藥深有奧妙綽有法度救急扶危起死回生與夫吉凶貴賤亦占於此即欲板行則力又不及焉今幸以菲材來尹應天之上元遂捐俸資以賞夙願且序其得之由噫儒先有云一命之士苟存心於愛物於人必有所濟豫讀儒書叨承上命而為民牧敢不以濟人利物為心乎是書之行多人得之不啻記里車之有所憑因訣察理循例治病其濟利豈淺淺哉成化己亥歲秋七月既生魄賜進士第知上元縣事長安蕭謙書
  hash: sha256:c615614d7248838b4cf02daa35f6dd3e2712773887bbb30c723d1f114c22e109
